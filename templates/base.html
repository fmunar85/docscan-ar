<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1565C0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DocScan AR" />
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />

  <title>{% block title %}DocScan AR{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome 6 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────── -->
  <nav class="ds-navbar">
    <div class="container-fluid px-3 d-flex align-items-center justify-content-between" style="height:100%">
      <a href="/" class="d-flex align-items-center gap-2 text-decoration-none">
        <span class="ds-nav-logo">📋</span>
        <span class="ds-nav-title">DocScan AR</span>
      </a>
      <div class="d-flex gap-2">
        <a href="/history?type=FACTURA" class="ds-nav-btn" title="Historial">
          <i class="fas fa-history"></i>
        </a>
      </div>
    </div>
  </nav>

  <!-- ── Contenido principal ────────────────────────── -->
  <main class="ds-main">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Toast ──────────────────────────────────────── -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="mainToast" class="toast border-0 text-white" role="alert" aria-live="assertive">
      <div class="d-flex align-items-center px-3 py-2">
        <span id="toastIcon" class="me-2 fs-5"></span>
        <span id="toastMsg" class="flex-grow-1"></span>
        <button type="button" class="btn-close btn-close-white ms-2" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
